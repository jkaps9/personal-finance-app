<section class="overview-transactions">
  <div class="container">
    <div class="card">
      <div class="card__title-row">
        <h2 class="section-title">Transactions</h2>
        <a
          href="{{ '/transactions/' | url }}"
          class="btn--tertiary"
        >
          <span>View All</span>
          {% include "svgs/icon-caret-right.svg" %}
        </a>
      </div>
      <ul class="transaction-list">
        {% for transaction in collections.transactions.slice(0, 5) %}
          <li class="transaction-list__item">
            <div class="transaction-list__image">
              <img
                src="{{ transaction.avatar | url }}"
                alt="{{ transaction.name }} avatar"
              />
            </div>
            <p class="transaction-list__description">{{ transaction.name }}</p>
            <div class="transaction-list__details">
              <p class="amount positive">{{ transaction.amount }}</p>
              <p class="date">{{ transaction.date }}</p>
            </div>
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</section>
