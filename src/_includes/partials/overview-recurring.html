<section class="overview-recurring">
  <div class="container">
    <div class="card">
      <div class="card__title-row">
        <h3 class="section-title">Recurring Bills</h3>
        <a
          href="{{ '/pots/' | url }}"
          class="btn--tertiary"
        >
          <span>See Details</span>
          {% include "svgs/icon-caret-right.svg" %}
        </a>
      </div>
      <div class="recurring-bills-container">
        <div
          class="bill"
          data-tag="green"
        >
          <h3>Paid Bills</h3>
          <p>$190.00</p>
        </div>
        <div
          class="bill"
          data-tag="yellow"
        >
          <h3>Total Upcoming</h3>
          <p>$194.98</p>
        </div>
        <div
          class="bill"
          data-tag="cyan"
        >
          <h3>Due Soon</h3>
          <p>$59.98</p>
        </div>
      </div>
    </div>
  </div>
</section>
