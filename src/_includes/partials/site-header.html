<header>
  <div class="container">
    <div class="navbar">
      <nav
        class="main-nav"
        aria-label="main"
      >
        <ul class="nav__list">
          {% for item in site.navigation %}
            <li class="nav__item {% if title === item.text %}active{% endif %}">
              <a href="{{ item.url | url }}">{{ item.text }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
      <div class="navbar__buttons"></div>
    </div>
  </div>
</header>
