<header class="dark-bg">
  <div class="container">
    <nav
      class="main-nav"
      aria-label="main"
    >
      <ul class="nav__list">
        {% for item in site.navigation %}
          <li class="nav__item {% if title === item.text %}active{% endif %}">
            <a href="{{ item.url | url }}">
              {% include item.img %}
              <span>{{ item.text }}</span>
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
    <div class="navbar__buttons"></div>
  </div>
</header>
