<section class="overview-budgets">
  <div class="container">
    <div class="card">
      <div class="card__title-row">
        <h2 class="section-title">Budgets</h2>
        <a
          href="{{ '/budgets/' | url }}"
          class="btn--tertiary"
        >
          <span>See Details</span>
          {% include "svgs/icon-caret-right.svg" %}
        </a>
      </div>
      <div class="budgets-container">
        <div class="chart">
          <canvas id="budget-chart"></canvas>
          <p>
            <span class="large-text">$338</span>
            of $975 limit
          </p>
        </div>
        <div class="budget-container">
          <div
            class="budget budget-1"
            data-tag="green"
          >
            <h3>Entertainment</h3>
            <p>$50.00</p>
          </div>
          <div
            class="budget budget-2"
            data-tag="cyan"
          >
            <h3>Bills</h3>
            <p>$750.00</p>
          </div>
          <div
            class="budget budget-3"
            data-tag="yellow"
          >
            <h3>Dining Out</h3>
            <p>$75.00</p>
          </div>
          <div
            class="budget budget-4"
            data-tag="navy"
          >
            <h3>Personal Care</h3>
            <p>$100.00</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer>
  const ctx = document.getElementById("budget-chart");

  const data = {
    labels: ["Entertainment", "Bills", "Dining Out", "Personal Care"],
    datasets: [
      {
        data: [50, 750, 75, 100],
        backgroundColor: ["#277c78", "#82c9d7", "#f2cdac", "#626070"],
        hoverOffset: 4,
      },
    ],
  };

  const config = {
    type: "doughnut",
    data: data,
    options: {
      cutout: "65%",
      plugins: {
        legend: {
          display: false,
        },
      },
    },
  };

  new Chart(ctx, config);
</script>
